<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule Panel</title>
  <style>
    :root {
      --bg: #f3efe6;
      --panel: #fffdf8;
      --line: #d8cbb8;
      --text: #2e261d;
      --muted: #6d6152;
      --accent: #a44a3f;
      --accent-soft: #f1ddd6;
      --ok: #2f7d4a;
      --warn: #9b6a1d;
      --danger: #aa2e2e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(164, 74, 63, 0.15), transparent 28%),
        linear-gradient(135deg, #f8f4ec, var(--bg));
      min-height: 100vh;
    }

    .shell {
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 14px 40px rgba(62, 45, 30, 0.08);
      backdrop-filter: blur(10px);
    }

    .intro {
      padding: 24px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 36px;
      line-height: 1.1;
    }

    .intro p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 18px;
    }

    .stat {
      padding: 16px;
      border-radius: 16px;
      background: var(--accent-soft);
    }

    .stat strong {
      display: block;
      font-size: 24px;
      margin-top: 6px;
    }

    .content {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
    }

    .form-card,
    .list-card {
      padding: 20px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 12px 14px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      border: none;
      transition: transform 160ms ease, opacity 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.94;
    }

    .button-secondary {
      background: #eadfce;
      color: var(--text);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .toolbar select {
      width: 180px;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      background: #fff;
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .item-title {
      font-weight: 700;
      font-size: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: #efe7db;
      color: var(--muted);
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 14px;
      font-size: 13px;
      color: var(--muted);
      margin: 10px 0;
    }

    .message {
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      background: #faf4eb;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .actions button {
      width: auto;
      padding: 10px 14px;
    }

    .status {
      margin-bottom: 14px;
      min-height: 24px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    @media (max-width: 980px) {
      .hero,
      .content {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <article class="card intro">
        <h1>定时任务调度台</h1>
        <p>这里展示 schedule 模块的所有延迟任务和周期任务。你可以直接在面板里新增、编辑、暂停、恢复和删除任务，并查看最近执行时间与下一次执行时间。</p>
      </article>
      <aside class="card stats">
        <div class="stat">
          <span>总任务数</span>
          <strong id="stat-total">0</strong>
        </div>
        <div class="stat">
          <span>活跃任务</span>
          <strong id="stat-active">0</strong>
        </div>
        <div class="stat">
          <span>周期任务</span>
          <strong id="stat-cron">0</strong>
        </div>
        <div class="stat">
          <span>延迟任务</span>
          <strong id="stat-delay">0</strong>
        </div>
      </aside>
    </section>

    <section class="content">
      <article class="card form-card">
        <div class="status" id="form-status"></div>
        <form id="schedule-form">
          <input type="hidden" id="schedule-id">
          <div class="field">
            <label for="title">标题</label>
            <input id="title" placeholder="例如：每天早上巡检">
          </div>
          <div class="field">
            <label for="message">任务内容</label>
            <textarea id="message" placeholder="到点后发送给 platform-core 的任务消息"></textarea>
          </div>
          <div class="row">
            <div class="field">
              <label for="sourceType">任务类型</label>
              <select id="sourceType">
                <option value="delay">delay</option>
                <option value="cron">cron</option>
              </select>
            </div>
            <div class="field">
              <label for="status-field">状态</label>
              <select id="status-field">
                <option value="active">active</option>
                <option value="paused">paused</option>
                <option value="completed">completed</option>
                <option value="failed">failed</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label for="delayMs">delayMs</label>
              <input id="delayMs" type="number" min="1" placeholder="60000">
            </div>
            <div class="field">
              <label for="cronExpression">cron 表达式</label>
              <input id="cronExpression" placeholder="0 9 * * *">
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label for="timezone">时区</label>
              <input id="timezone" placeholder="Asia/Shanghai">
            </div>
            <div class="field">
              <label for="sessionId">sessionId</label>
              <input id="sessionId" placeholder="可选">
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label for="claudeSessionId">claudeSessionId</label>
              <input id="claudeSessionId" placeholder="可选">
            </div>
            <div class="field">
              <label for="model">model</label>
              <input id="model" placeholder="可选">
            </div>
          </div>
          <div class="field">
            <label for="workingDirectory">workingDirectory</label>
            <input id="workingDirectory" placeholder="可选">
          </div>
          <div class="field">
            <label for="systemPrompt">systemPrompt</label>
            <textarea id="systemPrompt" placeholder="可选"></textarea>
          </div>
          <div class="row">
            <button type="submit" id="submit-button">新增任务</button>
            <button type="button" class="button-secondary" id="reset-button">清空表单</button>
          </div>
        </form>
      </article>

      <article class="card list-card">
        <div class="toolbar">
          <select id="status-filter">
            <option value="">全部状态</option>
            <option value="active">active</option>
            <option value="paused">paused</option>
            <option value="completed">completed</option>
            <option value="failed">failed</option>
          </select>
          <select id="source-filter">
            <option value="">全部类型</option>
            <option value="delay">delay</option>
            <option value="cron">cron</option>
          </select>
          <button id="refresh-button" type="button">刷新列表</button>
        </div>
        <div class="list" id="schedule-list"></div>
      </article>
    </section>
  </div>

  <script>
    const API_BASE = '__SCHEDULE_API_BASE__';
    const form = document.getElementById('schedule-form');
    const formStatus = document.getElementById('form-status');
    const listNode = document.getElementById('schedule-list');

    function setStatus(message, isError = false) {
      formStatus.textContent = message || '';
      formStatus.className = isError ? 'status error' : 'status';
    }

    function getFormPayload() {
      const payload = {
        title: document.getElementById('title').value.trim(),
        message: document.getElementById('message').value.trim(),
        sourceType: document.getElementById('sourceType').value,
        status: document.getElementById('status-field').value,
        delayMs: document.getElementById('delayMs').value,
        cronExpression: document.getElementById('cronExpression').value.trim(),
        timezone: document.getElementById('timezone').value.trim(),
        sessionId: document.getElementById('sessionId').value.trim(),
        claudeSessionId: document.getElementById('claudeSessionId').value.trim(),
        model: document.getElementById('model').value.trim(),
        workingDirectory: document.getElementById('workingDirectory').value.trim(),
        systemPrompt: document.getElementById('systemPrompt').value.trim()
      };

      if (payload.delayMs) {
        payload.delayMs = Number(payload.delayMs);
      } else {
        delete payload.delayMs;
      }

      Object.keys(payload).forEach((key) => {
        if (payload[key] === '') {
          delete payload[key];
        }
      });

      return payload;
    }

    function resetForm() {
      form.reset();
      document.getElementById('schedule-id').value = '';
      document.getElementById('submit-button').textContent = '新增任务';
      document.getElementById('status-field').value = 'active';
      setStatus('');
    }

    function formatTime(value) {
      return value ? new Date(value).toLocaleString('zh-CN') : '-';
    }

    function updateStats(items) {
      document.getElementById('stat-total').textContent = String(items.length);
      document.getElementById('stat-active').textContent = String(items.filter((item) => item.status === 'active').length);
      document.getElementById('stat-cron').textContent = String(items.filter((item) => item.sourceType === 'cron').length);
      document.getElementById('stat-delay').textContent = String(items.filter((item) => item.sourceType === 'delay').length);
    }

    function fillForm(item) {
      document.getElementById('schedule-id').value = item.id;
      document.getElementById('title').value = item.title || '';
      document.getElementById('message').value = item.message || '';
      document.getElementById('sourceType').value = item.sourceType;
      document.getElementById('status-field').value = item.status;
      document.getElementById('delayMs').value = item.delayMs || '';
      document.getElementById('cronExpression').value = item.cronExpression || '';
      document.getElementById('timezone').value = item.timezone || '';
      document.getElementById('sessionId').value = item.sessionId || '';
      document.getElementById('claudeSessionId').value = item.claudeSessionId || '';
      document.getElementById('model').value = item.model || '';
      document.getElementById('workingDirectory').value = item.workingDirectory || '';
      document.getElementById('systemPrompt').value = item.systemPrompt || '';
      document.getElementById('submit-button').textContent = '更新任务';
      setStatus(`已载入任务 ${item.id}，提交后将更新。`);
    }

    async function removeSchedule(scheduleId) {
      if (!window.confirm(`确认删除任务 ${scheduleId} ?`)) {
        return;
      }

      const response = await fetch(`${API_BASE}/schedules/${scheduleId}`, {
        method: 'DELETE'
      });
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || '删除失败');
      }
      await loadSchedules();
    }

    function renderItems(items) {
      updateStats(items);

      if (!items.length) {
        listNode.innerHTML = '<div class="item">当前没有符合条件的定时任务。</div>';
        return;
      }

      listNode.innerHTML = items.map((item) => {
        const summary = item.lastError ? `最近错误：${item.lastError}` : (item.lastResponseSummary || '最近返回摘要：-');
        return `
          <article class="item">
            <div class="item-header">
              <div>
                <div class="item-title">${item.title || item.id}</div>
                <div class="badge">${item.sourceType}</div>
                <div class="badge">${item.status}</div>
              </div>
              <div>${item.id}</div>
            </div>
            <div class="meta">
              <div>下次执行：${formatTime(item.nextRunAt)}</div>
              <div>上次执行：${formatTime(item.lastRunAt)}</div>
              <div>创建时间：${formatTime(item.createdAt)}</div>
              <div>更新时间：${formatTime(item.updatedAt)}</div>
              <div>delayMs：${item.delayMs || '-'}</div>
              <div>cron：${item.cronExpression || '-'}</div>
            </div>
            <div class="message">${(item.message || '').replace(/[&<>]/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[ch]))}</div>
            <div class="message">${summary.replace(/[&<>]/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[ch]))}</div>
            <div class="actions">
              <button type="button" data-edit="${item.id}">编辑</button>
              <button type="button" class="button-secondary" data-delete="${item.id}">删除</button>
            </div>
          </article>
        `;
      }).join('');

      items.forEach((item) => {
        const editButton = document.querySelector(`[data-edit="${item.id}"]`);
        const deleteButton = document.querySelector(`[data-delete="${item.id}"]`);
        editButton.addEventListener('click', () => fillForm(item));
        deleteButton.addEventListener('click', async () => {
          try {
            await removeSchedule(item.id);
          } catch (error) {
            setStatus(error.message || String(error), true);
          }
        });
      });
    }

    async function loadSchedules() {
      setStatus('正在加载任务列表...');
      const params = new URLSearchParams();
      const status = document.getElementById('status-filter').value;
      const sourceType = document.getElementById('source-filter').value;
      if (status) params.set('status', status);
      if (sourceType) params.set('sourceType', sourceType);

      const response = await fetch(`${API_BASE}/schedules?${params.toString()}`);
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || '加载失败');
      }
      renderItems(payload.items || []);
      setStatus(`已加载 ${payload.items.length} 个任务。`);
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      try {
        const id = document.getElementById('schedule-id').value;
        const payload = getFormPayload();
        const url = id ? `${API_BASE}/schedules/${id}` : `${API_BASE}/schedules`;
        const method = id ? 'PUT' : 'POST';
        const response = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const body = await response.json();
        if (!response.ok) {
          throw new Error(body.error || '提交失败');
        }
        resetForm();
        await loadSchedules();
      } catch (error) {
        setStatus(error.message || String(error), true);
      }
    });

    document.getElementById('reset-button').addEventListener('click', resetForm);
    document.getElementById('refresh-button').addEventListener('click', () => loadSchedules().catch((error) => setStatus(error.message || String(error), true)));
    document.getElementById('status-filter').addEventListener('change', () => loadSchedules().catch((error) => setStatus(error.message || String(error), true)));
    document.getElementById('source-filter').addEventListener('change', () => loadSchedules().catch((error) => setStatus(error.message || String(error), true)));
    document.getElementById('sourceType').addEventListener('change', () => {
      const isDelay = document.getElementById('sourceType').value === 'delay';
      document.getElementById('delayMs').disabled = !isDelay;
      document.getElementById('cronExpression').disabled = isDelay;
      document.getElementById('timezone').disabled = isDelay;
    });

    resetForm();
    loadSchedules().catch((error) => setStatus(error.message || String(error), true));
  </script>
</body>
</html>
