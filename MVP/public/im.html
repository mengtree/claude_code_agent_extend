<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentExtend IM Demo</title>
    <style>
      :root {
        --bg: #f2efe8;
        --panel: #fffdf8;
        --ink: #1f1c16;
        --muted: #746b5c;
        --line: #d7cfbf;
        --accent: #0d6b5f;
        --accent-soft: #d9efe9;
        --warning: #9a3f2c;
      }

      * {
        box-sizing: border-box;
        }

      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, #f6dbc8 0, rgba(246, 219, 200, 0.2) 28%, transparent 48%),
          linear-gradient(135deg, #f2efe8, #ebe4d5 55%, #ddd3c0);
        color: var(--ink);
        min-height: 100vh;
      }

      .shell {
        width: min(1480px, calc(100vw - 32px));
        margin: 24px auto;
        display: grid;
        grid-template-columns: 280px 320px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .panel {
        background: rgba(255, 253, 248, 0.92);
        border: 1px solid rgba(127, 108, 84, 0.18);
        border-radius: 20px;
        box-shadow: 0 14px 40px rgba(71, 54, 34, 0.12);
        backdrop-filter: blur(12px);
      }

      .conversation-panel,
      .sidebar,
      .chat {
        padding: 18px;
      }

      .conversation-panel,
      .sidebar {
        align-self: start;
      }

      .chat {
        display: grid;
        grid-template-rows: auto minmax(360px, 56vh) auto;
        gap: 18px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .title {
        font-size: 28px;
        line-height: 1.1;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .subtitle {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      .section {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
      }

      label {
        display: block;
        margin-bottom: 10px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      input,
      textarea,
      button,
      select {
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--line);
        font: inherit;
      }

      input,
      textarea,
      select {
        background: rgba(255, 255, 255, 0.92);
        padding: 12px 14px;
        color: var(--ink);
      }

      textarea {
        min-height: 88px;
        resize: vertical;
      }

      button {
        cursor: pointer;
        padding: 12px 16px;
        font-weight: 700;
        background: var(--accent);
        color: white;
        border: none;
        transition: transform 120ms ease, opacity 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button.secondary {
        background: var(--accent-soft);
        color: var(--accent);
        border: 1px solid rgba(13, 107, 95, 0.18);
      }

      button.warning {
        background: #f4d9d3;
        color: var(--warning);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .status {
        margin-top: 12px;
        padding: 10px 12px;
        background: #f8f4ea;
        border: 1px dashed var(--line);
        border-radius: 14px;
        color: var(--muted);
        font-size: 13px;
      }

      .chat-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
      }

      .feed {
        margin-top: 0;
        display: grid;
        gap: 12px;
        min-height: 0;
        max-height: 100%;
        overflow-y: auto;
        padding-right: 6px;
      }

      .feed::-webkit-scrollbar {
        width: 10px;
      }

      .feed::-webkit-scrollbar-thumb {
        background: rgba(116, 107, 92, 0.35);
        border-radius: 999px;
      }

      .bubble {
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid rgba(127, 108, 84, 0.15);
        line-height: 1.5;
      }

      .bubble-content {
        display: grid;
        gap: 8px;
      }

      .bubble-content > :first-child {
        margin-top: 0;
      }

      .bubble-content > :last-child {
        margin-bottom: 0;
      }

      .bubble-content p,
      .bubble-content ul,
      .bubble-content ol,
      .bubble-content pre,
      .bubble-content blockquote,
      .bubble-content h1,
      .bubble-content h2,
      .bubble-content h3,
      .bubble-content h4,
      .bubble-content h5,
      .bubble-content h6,
      .bubble-content hr {
        margin: 0;
      }

      .bubble-content ul,
      .bubble-content ol {
        padding-left: 20px;
      }

      .bubble-content li + li {
        margin-top: 4px;
      }

      .bubble-content code {
        font-family: "Cascadia Code", "Consolas", monospace;
        font-size: 0.92em;
        padding: 2px 6px;
        border-radius: 8px;
        background: rgba(31, 28, 22, 0.08);
      }

      .bubble-content pre {
        overflow-x: auto;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(31, 28, 22, 0.08);
        white-space: pre;
        position: relative;
      }

      .bubble-content pre code {
        display: block;
        padding: 0;
        background: transparent;
        white-space: inherit;
      }

      .bubble-content pre[data-language]::before {
        content: attr(data-language);
        display: inline-block;
        margin-bottom: 8px;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(13, 107, 95, 0.12);
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .bubble-content hr {
        border: none;
        border-top: 1px solid rgba(127, 108, 84, 0.24);
      }

      .bubble-content blockquote {
        padding-left: 12px;
        border-left: 3px solid rgba(13, 107, 95, 0.28);
        color: var(--muted);
      }

      .bubble-content a {
        color: var(--accent);
      }

      .bubble.user {
        background: #fff7ef;
      }

      .bubble.assistant {
        background: #eef6f4;
      }

      .bubble.push {
        background: #f3efe8;
      }

      .meta {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .task-list {
        margin-top: 18px;
        display: grid;
        gap: 10px;
        max-height: 220px;
        overflow-y: auto;
        padding-right: 4px;
      }

      .task-item {
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(127, 108, 84, 0.16);
      }

      .task-item strong {
        display: block;
        margin-bottom: 4px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 14px;
      }

      .conversation-list {
        display: grid;
        gap: 10px;
        max-height: min(70vh, 720px);
        overflow-y: auto;
        padding-right: 4px;
      }

      .conversation-item {
        width: 100%;
        text-align: left;
        padding: 14px;
        border-radius: 16px;
        border: 1px solid rgba(127, 108, 84, 0.16);
        background: rgba(255, 255, 255, 0.8);
        color: var(--ink);
      }

      .conversation-item.active {
        background: linear-gradient(135deg, rgba(217, 239, 233, 0.92), rgba(255, 247, 239, 0.92));
        border-color: rgba(13, 107, 95, 0.28);
      }

      .conversation-item strong,
      .conversation-item span {
        display: block;
      }

      .conversation-item strong {
        margin-bottom: 6px;
      }

      .conversation-item span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .conversation-empty {
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px dashed var(--line);
        background: rgba(255, 255, 255, 0.65);
        color: var(--muted);
        font-size: 13px;
      }

      .conversation-toolbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
      }

      @media (max-width: 960px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .toolbar,
        .row {
          grid-template-columns: 1fr;
        }

        .conversation-panel,
        .sidebar,
        .chat {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="panel conversation-panel">
        <h1 class="title">对话列表</h1>
        <p class="subtitle">左侧维护历史会话，点击即可切换当前上下文。</p>

        <div class="section">
          <div class="conversation-list" id="conversationList"></div>
        </div>
      </aside>

      <aside class="panel sidebar">
        <h1 class="title">IM Demo</h1>
        <p class="subtitle">用浏览器模拟一个接入外部 IM 的最小验证页。</p>

        <div class="section">
          <label for="source">Source</label>
          <input id="source" value="browser-demo" />

          <label for="conversationId">Conversation ID</label>
          <div class="conversation-toolbar">
            <input id="conversationId" value="demo-room-001" />
            <button id="newConversationButton" class="secondary" type="button">新建对话</button>
          </div>

          <label for="userId">User ID</label>
          <input id="userId" value="tester" />

          <label for="sessionId">Local Session ID</label>
          <input id="sessionId" placeholder="发送后自动填充，也可以手动输入" />

          <div class="toolbar">
            <button id="connectButton" class="secondary">连接推送</button>
            <button id="refreshTasksButton" class="secondary">刷新任务</button>
            <button id="clearSessionButton" class="warning">清空会话</button>
          </div>
        </div>

        <div class="section">
          <label for="message">Message</label>
          <textarea id="message" placeholder="帮我给这个智能体设计一个验证清单"></textarea>
          <div class="toolbar">
            <button id="sendButton">发送消息</button>
            <button id="runWorkerButton" class="secondary">运行 Worker</button>
            <button id="interruptButton" class="warning">中断任务</button>
          </div>
          <div class="status" id="status">尚未连接。</div>
        </div>
      </aside>

      <main class="panel chat">
        <div class="chat-header">
          <div>
            <h2>对话与推送</h2>
            <p class="subtitle">左侧发送消息，右侧同时展示被动回复和主动推送。</p>
          </div>
          <span class="pill" id="streamState">SSE: disconnected</span>
        </div>

        <div class="feed" id="feed"></div>

        <div class="section">
          <h3>任务队列</h3>
          <div class="task-list" id="taskList"></div>
        </div>
      </main>
    </div>

    <script>
      const sourceInput = document.getElementById('source');
      const conversationInput = document.getElementById('conversationId');
      const userInput = document.getElementById('userId');
      const sessionInput = document.getElementById('sessionId');
      const messageInput = document.getElementById('message');
      const statusNode = document.getElementById('status');
      const streamStateNode = document.getElementById('streamState');
      const feedNode = document.getElementById('feed');
      const taskListNode = document.getElementById('taskList');
      const conversationListNode = document.getElementById('conversationList');
      const sendButton = document.getElementById('sendButton');
      const connectButton = document.getElementById('connectButton');
      const newConversationButton = document.getElementById('newConversationButton');
      const refreshTasksButton = document.getElementById('refreshTasksButton');
      const runWorkerButton = document.getElementById('runWorkerButton');
      const interruptButton = document.getElementById('interruptButton');
      const clearSessionButton = document.getElementById('clearSessionButton');

      const MESSAGE_CACHE_STORAGE_KEY = 'agentextend-im-demo-message-cache-v1';
      const ACTIVE_CONVERSATION_STORAGE_KEY = 'agentextend-im-demo-active-conversation-v1';

      let eventSource;
      let connectedSessionId = '';
      let localMessageSequence = 0;
      let conversations = [];
      let activeConversationId = '';

      async function loadConversationState() {
        try {
          const storedConversations = window.localStorage.getItem(MESSAGE_CACHE_STORAGE_KEY);
          const storedActiveConversationId = window.localStorage.getItem(ACTIVE_CONVERSATION_STORAGE_KEY);
          const parsed = storedConversations ? JSON.parse(storedConversations) : [];

          conversations = Array.isArray(parsed)
            ? parsed.map((item, index) => sanitizeConversation(item, index))
            : [];

          recalculateLocalMessageSequence();

          if (storedActiveConversationId) {
            activeConversationId = storedActiveConversationId;
          }
        } catch (error) {
          console.error('Failed to restore active conversation', error);
          conversations = [];
          activeConversationId = '';
        }

        await refreshConversationList({ skipStatusUpdate: true });
      }

      function sanitizeConversation(value, index = 0) {
        const conversationId = typeof value?.id === 'string' && value.id.trim().length > 0
          ? value.id.trim()
          : buildConversationId();
        const messages = Array.isArray(value?.messages)
          ? value.messages.map((message, messageIndex) => sanitizeMessage(message, messageIndex))
          : [];
        const seenPushIds = Array.isArray(value?.seenPushIds)
          ? value.seenPushIds.filter((item) => typeof item === 'string' && item.trim().length > 0)
          : [];
        const createdAt = normalizeDate(value?.createdAt || new Date(Date.now() - index).toISOString());
        const lastActiveAt = normalizeDate(value?.lastActiveAt || createdAt);

        return {
          id: conversationId,
          source: typeof value?.source === 'string' && value.source.trim().length > 0 ? value.source.trim() : 'browser-demo',
          conversationId: typeof value?.conversationId === 'string' && value.conversationId.trim().length > 0
            ? value.conversationId.trim()
            : conversationId,
          userId: typeof value?.userId === 'string' && value.userId.trim().length > 0 ? value.userId.trim() : 'tester',
          sessionId: typeof value?.sessionId === 'string' ? value.sessionId.trim() : '',
          createdAt,
          lastActiveAt,
          messages,
          seenPushIds,
          previewText: typeof value?.previewText === 'string' ? value.previewText : '',
          isDraft: value?.isDraft === true
        };
      }

      function sanitizeMessage(value, index = 0) {
        const kind = typeof value?.kind === 'string' ? value.kind : 'assistant';
        const createdAt = normalizeDate(value?.createdAt);
        const normalizedId = normalizeMessageId(kind, value?.id);

        return {
          id: normalizedId || `local-${Date.now()}-${index}`,
          kind,
          title: typeof value?.title === 'string' ? value.title : '消息',
          content: typeof value?.content === 'string' ? value.content : '',
          meta: typeof value?.meta === 'string' ? value.meta : '',
          createdAt,
          createdAtMs: Date.parse(createdAt) || Date.now(),
          sequence: Number(value?.sequence) || index + 1
        };
      }

      function persistConversationState() {
        window.localStorage.setItem(MESSAGE_CACHE_STORAGE_KEY, JSON.stringify(conversations));

        if (activeConversationId) {
          window.localStorage.setItem(ACTIVE_CONVERSATION_STORAGE_KEY, activeConversationId);
        } else {
          window.localStorage.removeItem(ACTIVE_CONVERSATION_STORAGE_KEY);
        }
      }

      function getActiveConversation() {
        return conversations.find((item) => item.id === activeConversationId) || null;
      }

      function ensureConversation(overrides = {}) {
        const requestedId = typeof overrides.id === 'string' && overrides.id.trim().length > 0
          ? overrides.id.trim()
          : activeConversationId || conversationInput.value.trim() || buildConversationId();
        let conversation = conversations.find((item) => item.id === requestedId);

        if (!conversation) {
          conversation = sanitizeConversation({
            id: requestedId,
            conversationId: overrides.conversationId ?? requestedId,
            source: overrides.source ?? (sourceInput.value.trim() || 'browser-demo'),
            userId: overrides.userId ?? (userInput.value.trim() || 'tester'),
            sessionId: overrides.sessionId ?? sessionInput.value.trim(),
            createdAt: new Date().toISOString(),
            lastActiveAt: new Date().toISOString(),
            messages: [],
            seenPushIds: [],
            previewText: overrides.previewText ?? '',
            isDraft: overrides.isDraft !== false
          }, conversations.length);
          conversations.unshift(conversation);
        }

        conversation.source = typeof overrides.source === 'string' ? overrides.source.trim() : (sourceInput.value.trim() || conversation.source);
        conversation.conversationId = typeof overrides.conversationId === 'string'
          ? overrides.conversationId.trim()
          : (conversation.conversationId || conversation.id);
        conversation.userId = typeof overrides.userId === 'string' ? overrides.userId.trim() : (userInput.value.trim() || conversation.userId);

        if (typeof overrides.sessionId === 'string') {
          conversation.sessionId = overrides.sessionId.trim();
        } else if (sessionInput.value.trim()) {
          conversation.sessionId = sessionInput.value.trim();
        }

        if (typeof overrides.previewText === 'string') {
          conversation.previewText = overrides.previewText;
        }

        if (typeof overrides.isDraft === 'boolean') {
          conversation.isDraft = overrides.isDraft;
        }

        conversation.lastActiveAt = normalizeDate(overrides.lastActiveAt || new Date().toISOString());
        activeConversationId = conversation.id;
        persistConversationState();
        renderConversationList();
        syncInputsFromConversation(conversation);
        return conversation;
      }

      function syncInputsFromConversation(conversation) {
        if (!conversation) {
          return;
        }

        sourceInput.value = conversation.source;
        conversationInput.value = conversation.conversationId || conversation.id;
        userInput.value = conversation.userId;
        sessionInput.value = conversation.sessionId;
      }

      function recalculateLocalMessageSequence() {
        localMessageSequence = conversations.reduce((maxValue, conversation) => {
          const conversationMax = conversation.messages.reduce((innerMax, message) => {
            return Math.max(innerMax, Number(message.sequence) || 0);
          }, 0);

          return Math.max(maxValue, conversationMax);
        }, 0);
      }

      function mergeRemoteConversations(remoteConversations) {
        const existingConversationById = new Map(
          conversations.map((conversation) => [conversation.id, conversation])
        );
        const normalizedRemoteConversations = remoteConversations.map((value, index) => {
          const existingConversation = existingConversationById.get(value.id);

          return sanitizeConversation({
            ...value,
            userId: existingConversation?.userId || value.userId || 'tester',
            messages: existingConversation?.messages || [],
            seenPushIds: existingConversation?.seenPushIds || [],
            previewText: typeof value?.previewText === 'string'
              ? value.previewText
              : (existingConversation?.previewText || ''),
            isDraft: false
          }, index);
        });
        const remoteConversationIds = new Set(normalizedRemoteConversations.map((conversation) => conversation.id));
        const preservedDrafts = conversations
          .filter((conversation) => {
            if (remoteConversationIds.has(conversation.id)) {
              return false;
            }

            return conversation.isDraft || conversation.messages.length > 0 || conversation.id === activeConversationId;
          })
          .map((conversation, index) => sanitizeConversation({
            ...conversation,
            isDraft: true,
            lastActiveAt: conversation.lastActiveAt || new Date(Date.now() - index).toISOString()
          }, normalizedRemoteConversations.length + index));

        conversations = [...normalizedRemoteConversations, ...preservedDrafts];
        recalculateLocalMessageSequence();

        if (!activeConversationId && conversations[0]) {
          activeConversationId = conversations[0].id;
        }

        if (activeConversationId && !conversations.some((conversation) => conversation.id === activeConversationId)) {
          activeConversationId = conversations[0]?.id || '';
        }

        persistConversationState();
      }

      async function refreshConversationList(options = {}) {
        const skipStatusUpdate = options.skipStatusUpdate === true;

        try {
          const payload = await fetchJson('/adapters/im/conversations');
          const remoteConversations = Array.isArray(payload.conversations) ? payload.conversations : [];

          mergeRemoteConversations(remoteConversations);
          renderConversationList();

          const activeConversation = getActiveConversation();
          if (activeConversation) {
            syncInputsFromConversation(activeConversation);
            await loadConversationHistory(activeConversation, { skipStatusUpdate: true });
          }

          if (!skipStatusUpdate) {
            setStatus(`已从后端同步 ${remoteConversations.length} 个对话。`);
          }
        } catch (error) {
          console.error('Failed to load conversations', error);

          if (!skipStatusUpdate) {
            const message = error instanceof Error ? error.message : String(error);
            setStatus(`加载对话列表失败：${message}`);
          }
        }
      }

      async function loadConversationHistory(conversation, options = {}) {
        const skipStatusUpdate = options.skipStatusUpdate === true;

        if (!conversation || !conversation.source || !(conversation.conversationId || conversation.id) || conversation.isDraft) {
          return;
        }

        try {
          const payload = await fetchJson(
            `/adapters/im/messages?source=${encodeURIComponent(conversation.source)}&conversationId=${encodeURIComponent(conversation.conversationId || conversation.id)}`
          );
          const remoteMessages = Array.isArray(payload.messages)
            ? payload.messages.map((message, index) => sanitizeMessage({
              id: message.id,
              kind: message.kind,
              title: message.title,
              content: message.content,
              meta: message.meta,
              createdAt: message.createdAt,
              sequence: index + 1
            }, index))
            : [];

          conversation.messages = remoteMessages;
          conversation.seenPushIds = remoteMessages
            .filter((message) => message.kind === 'push')
            .map((message) => message.id);
          conversation.previewText = remoteMessages[remoteMessages.length - 1]?.content || conversation.previewText;
          conversation.lastActiveAt = remoteMessages[remoteMessages.length - 1]?.createdAt || conversation.lastActiveAt;
          conversation.isDraft = false;

          if (typeof payload.sessionId === 'string' && payload.sessionId.trim().length > 0) {
            conversation.sessionId = payload.sessionId.trim();
          }

          recalculateLocalMessageSequence();
          persistConversationState();
          renderConversationList();
          renderFeed();

          if (!skipStatusUpdate && conversation.id === activeConversationId) {
            setStatus(`已同步对话历史: ${conversation.conversationId || conversation.id}`);
          }
        } catch (error) {
          console.error('Failed to load conversation history', error);

          if (!skipStatusUpdate && conversation.id === activeConversationId) {
            const message = error instanceof Error ? error.message : String(error);
            setStatus(`加载消息历史失败：${message}`);
          }
        }
      }

      function getConversationDisplayTimestamp(conversation) {
        const latestMessage = Array.isArray(conversation?.messages) && conversation.messages.length > 0
          ? conversation.messages.reduce((latest, message) => {
            const messageTime = Date.parse(message?.createdAt || '');

            if (Number.isNaN(messageTime)) {
              return latest;
            }

            if (latest === null || messageTime > latest) {
              return messageTime;
            }

            return latest;
          }, null)
          : null;
        const lastActiveAtTime = Date.parse(conversation?.lastActiveAt || '');
        const createdAtTime = Date.parse(conversation?.createdAt || '');

        if (latestMessage !== null && !Number.isNaN(lastActiveAtTime)) {
          return Math.max(latestMessage, lastActiveAtTime);
        }

        if (latestMessage !== null) {
          return latestMessage;
        }

        if (!Number.isNaN(lastActiveAtTime)) {
          return lastActiveAtTime;
        }

        if (!Number.isNaN(createdAtTime)) {
          return createdAtTime;
        }

        return 0;
      }

      function getConversationDisplayTime(conversation) {
        const timestamp = getConversationDisplayTimestamp(conversation);

        if (timestamp <= 0) {
          return '';
        }

        return new Date(timestamp).toISOString();
      }

      function renderConversationList() {
        conversationListNode.innerHTML = '';

        if (conversations.length === 0) {
          conversationListNode.innerHTML = '<div class="conversation-empty">当前还没有对话，点击“新建对话”即可开始。</div>';
          return;
        }

        [...conversations]
          .sort((left, right) => {
            const leftTime = getConversationDisplayTimestamp(left);
            const rightTime = getConversationDisplayTimestamp(right);
            return rightTime - leftTime;
          })
          .forEach((conversation) => {
            const previewMessage = conversation.messages[conversation.messages.length - 1];
            const displayTime = getConversationDisplayTime(conversation);
            const previewText = previewMessage?.content?.slice(0, 42)
              || conversation.previewText?.slice(0, 42)
              || (conversation.isDraft ? '尚未发送消息' : '后端已同步，等待新消息');
            const button = document.createElement('button');
            button.type = 'button';
            button.className = `conversation-item${conversation.id === activeConversationId ? ' active' : ''}`;
            button.innerHTML = `
              <strong>${escapeHtml(conversation.conversationId || conversation.id)}</strong>
              <span>${escapeHtml(conversation.source)} / ${escapeHtml(conversation.userId)}</span>
              <span>${escapeHtml(previewText)}</span>
              <span>${escapeHtml(conversation.sessionId || '未绑定 session')} | ${escapeHtml(formatTimestamp(displayTime))}</span>
            `;
            button.addEventListener('click', () => {
              selectConversation(conversation.id);
            });
            conversationListNode.appendChild(button);
          });
      }

      function selectConversation(conversationId) {
        const conversation = conversations.find((item) => item.id === conversationId);

        if (!conversation) {
          return;
        }

        activeConversationId = conversation.id;
        persistConversationState();
        syncInputsFromConversation(conversation);
        renderConversationList();
        renderFeed();
        if (eventSource) {
          eventSource.close();
          eventSource = undefined;
        }
        connectedSessionId = '';
        streamStateNode.textContent = conversation.sessionId ? 'SSE: disconnected' : 'SSE: idle';
        if (conversation.sessionId) {
          connectSse();
        } else {
          setStatus(`已切换对话: ${conversation.id}`);
        }
        void loadConversationHistory(conversation, { skipStatusUpdate: true });
        refreshTasks();
      }

      function appendBubble(kind, title, content, meta, createdAt, itemId) {
        const conversation = ensureConversation();
        const normalizedCreatedAt = normalizeDate(createdAt);
        const normalizedId = normalizeMessageId(kind, itemId) || `local-${++localMessageSequence}`;
        const seenPushIds = new Set(conversation.seenPushIds);
        const hasExistingMessage = conversation.messages.some((message) => {
          const existingKind = typeof message?.kind === 'string' ? message.kind : 'assistant';
          return existingKind === kind && normalizeMessageId(existingKind, message?.id) === normalizedId;
        });

        if (hasExistingMessage) {
          if (kind === 'push' && !seenPushIds.has(normalizedId)) {
            conversation.seenPushIds.push(normalizedId);
            persistConversationState();
          }
          return;
        }

        if (kind === 'push' && seenPushIds.has(normalizedId)) {
          return;
        }

        if (kind === 'push') {
          conversation.seenPushIds.push(normalizedId);
        }

        conversation.messages.push({
          id: normalizedId,
          kind,
          title,
          content: content ?? '',
          meta: meta || '',
          createdAt: normalizedCreatedAt,
          createdAtMs: Date.parse(normalizedCreatedAt) || Date.now(),
          sequence: localMessageSequence
        });

        conversation.previewText = content ?? '';
        conversation.lastActiveAt = normalizedCreatedAt;
        persistConversationState();
        renderConversationList();
        renderFeed();
      }

      function renderFeed() {
        const conversation = getActiveConversation();

        if (!conversation) {
          feedNode.innerHTML = '<article class="bubble push"><strong>系统消息</strong><div class="bubble-content"><p>当前没有选中的对话。</p></div><div class="meta">等待创建</div></article>';
          return;
        }

        const items = [...conversation.messages].sort((left, right) => {
          if (left.createdAtMs !== right.createdAtMs) {
            return left.createdAtMs - right.createdAtMs;
          }

          return left.sequence - right.sequence;
        });

        feedNode.innerHTML = '';

        if (items.length === 0) {
          feedNode.innerHTML = '<article class="bubble push"><strong>系统消息</strong><div class="bubble-content"><p>当前对话还没有消息，发送一条内容或连接 SSE 后会显示在这里。</p></div><div class="meta">等待消息</div></article>';
          return;
        }

        items.forEach((item) => {
          const bubble = document.createElement('article');
          bubble.className = `bubble ${item.kind}`;
          bubble.innerHTML = `<strong>${escapeHtml(item.title)}</strong><div class="bubble-content">${renderMarkdown(item.content)}</div><div class="meta">${escapeHtml(buildMetaText(item.meta, item.createdAt))}</div>`;
          feedNode.appendChild(bubble);
        });

        requestAnimationFrame(() => {
          feedNode.scrollTop = feedNode.scrollHeight;
        });
      }

      function buildMetaText(meta, createdAt) {
        const timeText = formatTimestamp(createdAt);
        return meta ? `${meta} | ${timeText}` : timeText;
      }

      function normalizeMessageId(kind, value) {
        if (typeof value !== 'string') {
          return '';
        }

        const normalizedValue = value.trim();

        if (!normalizedValue) {
          return '';
        }

        if (kind === 'push' && normalizedValue.startsWith('push:')) {
          return normalizedValue.slice(5);
        }

        return normalizedValue;
      }

      function buildConversationId() {
        const timestamp = new Date();
        const datePart = [
          timestamp.getFullYear(),
          String(timestamp.getMonth() + 1).padStart(2, '0'),
          String(timestamp.getDate()).padStart(2, '0')
        ].join('');
        const timePart = [
          String(timestamp.getHours()).padStart(2, '0'),
          String(timestamp.getMinutes()).padStart(2, '0'),
          String(timestamp.getSeconds()).padStart(2, '0')
        ].join('');
        const randomPart = Math.random().toString(36).slice(2, 8);

        return `demo-room-${datePart}-${timePart}-${randomPart}`;
      }

      function resetConversationState() {
        if (eventSource) {
          eventSource.close();
          eventSource = undefined;
        }

        connectedSessionId = '';
        streamStateNode.textContent = 'SSE: disconnected';
        taskListNode.innerHTML = '<div class="task-item">当前没有任务。</div>';
      }

      function createNewConversation() {
        const nextConversationId = buildConversationId();
        resetConversationState();
        ensureConversation({
          id: nextConversationId,
          conversationId: nextConversationId,
          source: sourceInput.value.trim() || 'browser-demo',
          userId: userInput.value.trim() || 'tester',
          sessionId: '',
          previewText: '',
          isDraft: true
        });
        renderFeed();
        setStatus(`已创建新对话: ${nextConversationId}`);
      }

      function normalizeDate(value) {
        if (typeof value === 'string') {
          const timestamp = Date.parse(value);
          if (!Number.isNaN(timestamp)) {
            return new Date(timestamp).toISOString();
          }
        }

        return new Date().toISOString();
      }

      function formatTimestamp(value) {
        const timestamp = Date.parse(value);

        if (Number.isNaN(timestamp)) {
          return value;
        }

        return new Date(timestamp).toLocaleString('zh-CN', {
          hour12: false
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;');
      }

      function renderMarkdown(value) {
        const normalized = String(value ?? '').replace(/\r\n/g, '\n');

        if (!normalized.trim()) {
          return '<p></p>';
        }

        const lines = normalized.split('\n');
        const blocks = [];
        let index = 0;

        while (index < lines.length) {
          const line = lines[index];
          const trimmedLine = line.trim();

          if (!trimmedLine) {
            index += 1;
            continue;
          }

          const codeFenceMatch = trimmedLine.match(/^```([A-Za-z0-9_-]+)?\s*$/);

          if (codeFenceMatch) {
            const language = codeFenceMatch[1] || '';
            const codeLines = [];
            index += 1;

            while (index < lines.length && !lines[index].trim().match(/^```\s*$/)) {
              codeLines.push(lines[index]);
              index += 1;
            }

            if (index < lines.length) {
              index += 1;
            }

            blocks.push(renderCodeBlock(codeLines.join('\n'), language));
            continue;
          }

          const headingMatch = trimmedLine.match(/^(#{1,6})\s+(.+)$/);

          if (headingMatch) {
            const level = Math.min(headingMatch[1].length, 6);
            blocks.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
            index += 1;
            continue;
          }

          if (/^([-*_])(?:\s*\1){2,}\s*$/.test(trimmedLine)) {
            blocks.push('<hr />');
            index += 1;
            continue;
          }

          if (/^>\s?/.test(trimmedLine)) {
            const quoteLines = [];

            while (index < lines.length && /^>\s?/.test(lines[index].trim())) {
              quoteLines.push(lines[index].trim().replace(/^>\s?/, ''));
              index += 1;
            }

            blocks.push(`<blockquote>${renderMarkdown(quoteLines.join('\n'))}</blockquote>`);
            continue;
          }

          if (/^[-*+]\s+/.test(trimmedLine) || /^\d+\.\s+/.test(trimmedLine)) {
            const listResult = renderMarkdownList(lines, index);
            blocks.push(listResult.html);
            index = listResult.nextIndex;
            continue;
          }

          const paragraphLines = [];

          while (index < lines.length && !isMarkdownBlockBoundary(lines[index])) {
            paragraphLines.push(lines[index].trim());
            index += 1;
          }

          if (paragraphLines.length > 0) {
            blocks.push(`<p>${paragraphLines.map((paragraphLine) => renderInlineMarkdown(paragraphLine)).join('<br />')}</p>`);
          }
        }

        return blocks.join('');
      }

      function isMarkdownBlockBoundary(line) {
        const trimmedLine = line.trim();

        return trimmedLine.length === 0
          || /^```/.test(trimmedLine)
          || /^(#{1,6})\s+/.test(trimmedLine)
          || /^>\s?/.test(trimmedLine)
          || /^([-*_])(?:\s*\1){2,}\s*$/.test(trimmedLine)
          || /^[-*+]\s+/.test(trimmedLine)
          || /^\d+\.\s+/.test(trimmedLine);
      }

      function renderMarkdownList(lines, startIndex) {
        const ordered = /^\d+\.\s+/.test(lines[startIndex].trim());
        const itemPattern = ordered ? /^\d+\.\s+([\s\S]+)$/ : /^[-*+]\s+([\s\S]+)$/;
        const items = [];
        let index = startIndex;

        while (index < lines.length) {
          const line = lines[index];
          const trimmedLine = line.trim();

          if (!trimmedLine) {
            break;
          }

          const itemMatch = trimmedLine.match(itemPattern);

          if (!itemMatch) {
            break;
          }

          const itemLines = [itemMatch[1]];
          index += 1;

          while (index < lines.length) {
            const continuationLine = lines[index];
            const trimmedContinuationLine = continuationLine.trim();

            if (!trimmedContinuationLine) {
              break;
            }

            if (itemPattern.test(trimmedContinuationLine) || isMarkdownBlockBoundary(continuationLine)) {
              break;
            }

            itemLines.push(trimmedContinuationLine);
            index += 1;
          }

          items.push(`<li>${itemLines.map((itemLine) => renderInlineMarkdown(itemLine)).join('<br />')}</li>`);
        }

        return {
          html: ordered ? `<ol>${items.join('')}</ol>` : `<ul>${items.join('')}</ul>`,
          nextIndex: index
        };
      }

      function renderCodeBlock(code, language) {
        const normalizedCode = code.replace(/^\n+|\n+$/g, '');
        const languageLabel = language.trim();
        const languageAttribute = languageLabel ? ` data-language="${escapeHtml(languageLabel)}"` : '';
        const classAttribute = languageLabel ? ` class="language-${escapeHtml(languageLabel)}"` : '';

        return `<pre${languageAttribute}><code${classAttribute}>${escapeHtml(normalizedCode)}</code></pre>`;
      }

      function renderInlineMarkdown(value) {
        const placeholders = [];
        let escaped = escapeHtml(value);

        escaped = escaped.replace(/`([^`\n]+)`/g, (_, code) => {
          const placeholder = `%%INLINE_${placeholders.length}%%`;
          placeholders.push(`<code>${code}</code>`);
          return placeholder;
        });

        escaped = escaped.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (_, text, url) => {
          const placeholder = `%%INLINE_${placeholders.length}%%`;
          placeholders.push(`<a href="${url}" target="_blank" rel="noreferrer noopener">${renderInlineMarkdown(text)}</a>`);
          return placeholder;
        });

        escaped = escaped
          .replace(/~~(.+?)~~/g, '<del>$1</del>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/__(.+?)__/g, '<strong>$1</strong>')
          .replace(/(^|[^*])\*(?!\s)(.+?)(?<!\s)\*(?!\*)/g, '$1<em>$2</em>')
          .replace(/(^|[^_])_(?!\s)(.+?)(?<!\s)_(?!_)/g, '$1<em>$2</em>');

        placeholders.forEach((html, index) => {
          escaped = escaped.replace(`%%INLINE_${index}%%`, html);
        });

        return escaped;
      }

      async function sendImMessage() {
        const sentAt = new Date().toISOString();
        const requestedConversationId = conversationInput.value.trim() || buildConversationId();
        const conversation = getActiveConversation() || ensureConversation({
          id: requestedConversationId,
          conversationId: requestedConversationId,
          source: sourceInput.value.trim(),
          userId: userInput.value.trim(),
          sessionId: sessionInput.value.trim(),
          isDraft: true
        });

        conversation.source = sourceInput.value.trim() || conversation.source;
        conversation.userId = userInput.value.trim() || conversation.userId;
        conversation.sessionId = sessionInput.value.trim() || conversation.sessionId;
        conversation.conversationId = conversationInput.value.trim() || conversation.conversationId || conversation.id;
        const payload = {
          source: conversation.source,
          conversationId: conversation.conversationId || conversation.id,
          userId: conversation.userId,
          sessionId: conversation.sessionId || undefined,
          message: messageInput.value.trim()
        };

        if (!payload.message) {
          setStatus('请输入消息内容。');
          return;
        }

        try {
          setStatus('正在发送消息...');
          const data = await fetchJson('/adapters/im/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const replyText = typeof data.reply === 'string' && data.reply.trim().length > 0
            ? data.reply
            : '';
          const intentText = typeof data.intent === 'string' ? data.intent : 'unknown';
          const queuedTaskId = typeof data.queuedTaskId === 'string' ? data.queuedTaskId : '';
          const acceptedMessageId = typeof data.acceptedMessageId === 'string' ? data.acceptedMessageId : '';

          if (typeof data.sessionId === 'string' && data.sessionId.trim().length > 0) {
            conversation.sessionId = data.sessionId.trim();
            conversation.isDraft = false;
            sessionInput.value = conversation.sessionId;
          }
          appendBubble(
            'user',
            '用户输入',
            payload.message,
            `${payload.source} / ${payload.conversationId}`,
            sentAt,
            acceptedMessageId || undefined
          );
          messageInput.value = '';
          if (replyText) {
            appendBubble('assistant', '被动回复', replyText, `intent: ${intentText}${queuedTaskId ? ` | task: ${queuedTaskId}` : ''}`, new Date().toISOString());
          }
          persistConversationState();
          await refreshConversationList({ skipStatusUpdate: true });
          const syncedConversation = getActiveConversation();
          if (syncedConversation) {
            await loadConversationHistory(syncedConversation, { skipStatusUpdate: true });
          }
          renderConversationList();
          setStatus(replyText
            ? `已发送，当前 session: ${sessionInput.value}`
            : `任务已入队，等待推送。当前 session: ${sessionInput.value}${queuedTaskId ? ` | task: ${queuedTaskId}` : ''}`);
          connectSse();
          refreshTasks();
        } catch (error) {
          const message = error instanceof Error ? error.message : String(error);
          appendBubble('assistant', '被动回复', `请求失败：${message}`, 'error', new Date().toISOString());
          setStatus(`发送失败：${message}`);
        }
      }

      async function refreshTasks() {
        const conversation = getActiveConversation() || ensureConversation({
          source: sourceInput.value.trim(),
          userId: userInput.value.trim(),
          sessionId: sessionInput.value.trim()
        });
        conversation.source = sourceInput.value.trim() || conversation.source;
        conversation.userId = userInput.value.trim() || conversation.userId;
        conversation.sessionId = sessionInput.value.trim() || conversation.sessionId;
        const source = conversation.source;
        const conversationId = conversation.conversationId || conversation.id;

        if (!source || !conversationId) {
          taskListNode.innerHTML = '<div class="task-item">缺少 source 或 conversationId，无法查看任务。</div>';
          return;
        }

        const payload = await fetchJson(`/adapters/im/tasks?source=${encodeURIComponent(source)}&conversationId=${encodeURIComponent(conversationId)}`);
        const tasks = Array.isArray(payload.tasks) ? payload.tasks : [];

        if (typeof payload.sessionId === 'string' && payload.sessionId.trim().length > 0) {
          conversation.sessionId = payload.sessionId.trim();
          sessionInput.value = conversation.sessionId;
          persistConversationState();
          renderConversationList();
        }

        taskListNode.innerHTML = '';

        if (tasks.length === 0) {
          taskListNode.innerHTML = '<div class="task-item">当前没有任务。</div>';
          return;
        }

        [...tasks]
          .sort((left, right) => {
            const leftTime = Date.parse(left.createdAt || '') || 0;
            const rightTime = Date.parse(right.createdAt || '') || 0;
            return leftTime - rightTime;
          })
          .forEach((task) => {
          const node = document.createElement('div');
          node.className = 'task-item';
          node.innerHTML = `<strong>${escapeHtml(task.summary || task.id)}</strong><div>${escapeHtml(task.status)} | ${escapeHtml(task.priority)}</div><div class="meta">${escapeHtml(task.id)} | ${escapeHtml(formatTimestamp(task.createdAt || ''))}</div>`;
          taskListNode.appendChild(node);
          });
      }

      async function runWorkerOnce() {
        try {
          setStatus('正在触发 worker...');
          await fetchJson('/worker/run-once?pollMs=500', { method: 'POST' });
          setStatus('worker 已处理当前积压任务。');
          refreshTasks();
        } catch (error) {
          const message = error instanceof Error ? error.message : String(error);
          setStatus(`worker 执行失败：${message}`);
        }
      }

      async function interruptSession() {
        const conversation = getActiveConversation();
        const sessionId = conversation?.sessionId || sessionInput.value.trim();

        if (!sessionId) {
          setStatus('没有 sessionId，无法中断。');
          return;
        }

        try {
          await fetchJson(`/sessions/${encodeURIComponent(sessionId)}/interrupt`, { method: 'POST' });
          setStatus('已请求中断当前任务。');
        } catch (error) {
          const message = error instanceof Error ? error.message : String(error);
          setStatus(`中断失败：${message}`);
        }
      }

      async function clearSession() {
        const conversation = getActiveConversation();
        const sessionId = conversation?.sessionId || sessionInput.value.trim();

        if (!sessionId) {
          setStatus('没有 sessionId，无法清空。');
          return;
        }

        try {
          await fetchJson(`/sessions/${encodeURIComponent(sessionId)}/clear`, { method: 'POST' });
          if (conversation) {
            conversation.sessionId = '';
            sessionInput.value = '';
            persistConversationState();
            renderConversationList();
          }
          await refreshConversationList({ skipStatusUpdate: true });
          const syncedConversation = getActiveConversation();
          if (syncedConversation) {
            await loadConversationHistory(syncedConversation, { skipStatusUpdate: true });
          }
          refreshTasks();
          setStatus('会话已清空。');
        } catch (error) {
          const message = error instanceof Error ? error.message : String(error);
          setStatus(`清空失败：${message}`);
        }
      }

      function connectSse() {
        const conversation = getActiveConversation() || ensureConversation({
          source: sourceInput.value.trim(),
          userId: userInput.value.trim(),
          sessionId: sessionInput.value.trim()
        });
        conversation.source = sourceInput.value.trim() || conversation.source;
        conversation.userId = userInput.value.trim() || conversation.userId;
        conversation.sessionId = sessionInput.value.trim() || conversation.sessionId;
        const sessionId = conversation.sessionId || sessionInput.value.trim();

        if (!sessionId) {
          setStatus('没有 sessionId，无法连接 SSE。');
          return;
        }

        if (eventSource && connectedSessionId === sessionId) {
          setStatus(`推送流已连接: ${sessionId}`);
          return;
        }

        if (eventSource) {
          eventSource.close();
        }

        connectedSessionId = sessionId;
        const replay = conversation.seenPushIds.length === 0 ? 20 : 0;
        eventSource = new EventSource(`/events?sessionId=${encodeURIComponent(sessionId)}&replay=${replay}`);
        streamStateNode.textContent = 'SSE: connecting';

        eventSource.addEventListener('push', (event) => {
          const payload = JSON.parse(event.data);
          const title = payload.category === 'passive_reply' ? '被动回复' : '主动推送';
          appendBubble(
            'push',
            title,
            payload.content,
            `${payload.category} | ${payload.taskId || 'no-task'}`,
            payload.createdAt,
            payload.id
          );
          refreshTasks();
        });

        eventSource.onopen = () => {
          streamStateNode.textContent = 'SSE: connected';
          setStatus(`已连接推送流: ${sessionId}`);
        };

        eventSource.onerror = () => {
          streamStateNode.textContent = 'SSE: disconnected';
        };
      }

      function setStatus(text) {
        statusNode.textContent = text;
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        const text = await response.text();
        const data = text.trim().length > 0 ? JSON.parse(text) : {};

        if (!response.ok) {
          const errorMessage = typeof data.error === 'string'
            ? data.error
            : `HTTP ${response.status}`;
          throw new Error(errorMessage);
        }

        return data;
      }

      sendButton.addEventListener('click', sendImMessage);
      connectButton.addEventListener('click', connectSse);
      newConversationButton.addEventListener('click', createNewConversation);
      refreshTasksButton.addEventListener('click', refreshTasks);
      runWorkerButton.addEventListener('click', runWorkerOnce);
      interruptButton.addEventListener('click', interruptSession);
      clearSessionButton.addEventListener('click', clearSession);

      async function initializePage() {
        await loadConversationState();

        if (!getActiveConversation()) {
          const initialConversationId = conversationInput.value.trim() || buildConversationId();
          ensureConversation({
            id: initialConversationId,
            conversationId: initialConversationId,
            source: sourceInput.value.trim() || 'browser-demo',
            userId: userInput.value.trim() || 'tester',
            sessionId: sessionInput.value.trim(),
            isDraft: true
          });
        } else {
          syncInputsFromConversation(getActiveConversation());
        }

        renderConversationList();
        renderFeed();
        try {
          await refreshTasks();
        } catch (error) {
          const message = error instanceof Error ? error.message : String(error);
          setStatus(`初始化任务列表失败：${message}`);
        }
      }

      void initializePage();
    </script>
  </body>
</html>
